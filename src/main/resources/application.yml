server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: overseas-purchase-system
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/overseas_purchase?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  security:
    enabled: false
  sql:
    init:
      mode: never
      encoding: UTF-8
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.overseas.purchase.entity

jwt:
  secret: ${JWT_SECRET:overseas-purchase-system-secret-key-2024-please-change-me-64bytes-long-123456}
  expiration: 86400000

file:
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads/}

payment:
  provider: ${PAYMENT_PROVIDER:LEGACY_QR}
  qrcode:
    payment-domain: ${PAYMENT_DOMAIN:http://localhost:8081}
  wechat:
    gateway: ${WECHAT_GATEWAY:https://api.mch.weixin.qq.com}
    app-id: ${WECHAT_APP_ID:}
    mch-id: ${WECHAT_MCH_ID:}
    serial-no: ${WECHAT_SERIAL_NO:}
    private-key: ${WECHAT_PRIVATE_KEY:}
    private-key-path: ${WECHAT_PRIVATE_KEY_PATH:}
    platform-public-key: ${WECHAT_PLATFORM_PUBLIC_KEY:}
    platform-public-key-path: ${WECHAT_PLATFORM_PUBLIC_KEY_PATH:}
    api-v3-key: ${WECHAT_API_V3_KEY:}
    notify-url: ${WECHAT_NOTIFY_URL:http://localhost:8080/api/payment/notify/wechat}
    timeout-seconds: ${WECHAT_QR_TIMEOUT_SECONDS:900}
    notify-skip-verify: ${WECHAT_NOTIFY_SKIP_VERIFY:false}
  alipay:
    gateway: ${ALIPAY_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
    app-id: ${ALIPAY_APP_ID:}
    private-key: ${ALIPAY_PRIVATE_KEY:}
    private-key-path: ${ALIPAY_PRIVATE_KEY_PATH:}
    public-key: ${ALIPAY_PUBLIC_KEY:}
    public-key-path: ${ALIPAY_PUBLIC_KEY_PATH:}
    notify-url: ${ALIPAY_NOTIFY_URL:}
    charset: ${ALIPAY_CHARSET:UTF-8}
    sign-type: ${ALIPAY_SIGN_TYPE:RSA2}
    timeout-minutes: ${ALIPAY_TIMEOUT_MINUTES:15}

moderation:
  enabled: ${MODERATION_ENABLED:false}
  provider: ${MODERATION_PROVIDER:openai-compatible}
  base-url: ${MODERATION_BASE_URL:https://api.openai.com/v1/chat/completions}
  api-key: ${MODERATION_API_KEY:}
  model: ${MODERATION_MODEL:gpt-4.1-mini}
  timeout-ms: ${MODERATION_TIMEOUT_MS:4000}
  threshold-allow: ${MODERATION_THRESHOLD_ALLOW:0.30}
  threshold-block: ${MODERATION_THRESHOLD_BLOCK:0.75}
