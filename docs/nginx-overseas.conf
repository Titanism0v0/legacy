# Nginx 配置模板（Windows 上也可用）
#
# 功能：
# - 托管 Vue2 dist 静态站点
# - 反代 /api/* 到后端 Spring Boot（8080，且后端 context-path=/api）
# - 反代 /api/ws/chat 为 WebSocket（必须支持 Upgrade）
#
# 使用方法：
# - 修改 server_name（可先填公网 IP）
# - 修改 root 为你实际 dist 目录
#
# 注意：
# - 若你后端、Nginx 不在同一台机器，请把 proxy_pass 改成实际地址

server {
    listen 80;
    server_name your-public-ip-or-domain;

    # 1) 前端静态站点目录（改成你的 dist 路径）
    root D:/www/overseas/dist;
    index index.html;

    # 2) Vue history 模式回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3) 文件上传/静态资源/REST API
    # 后端 context-path=/api，所以这里直接代理 /api/* 给后端
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;

        # 上传文件较大时可适当放大
        client_max_body_size 20m;
    }

    # 4) WebSocket（聊天）
    location /api/ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

