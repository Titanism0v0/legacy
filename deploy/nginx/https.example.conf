# HTTPS 示例（不会被 docker-compose 挂载，不会申请证书，也不包含真实域名）。
# 使用前由运维人员：
# 1. 将 server_name _ 替换为已备案并实际解析的域名；
# 2. 将证书路径替换为真实只读挂载路径；
# 3. 保留现有 default.conf 作为 HTTP/IP 兼容配置。

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /run/secrets/tls_fullchain;
    ssl_certificate_key /run/secrets/tls_private_key;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }
}
